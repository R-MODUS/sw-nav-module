slam_toolbox:
  ros__parameters:
    use_sim_time: true
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    mode: mapping
    # Důležité pro stabilitu:
    map_update_interval: 2.0
    resolution: 0.05
    transform_publish_period: 0.02
    max_laser_range: 5.0 
    max_range: 4.5 
    minimum_laser_range: 0.1
    debug_logging: true