# =============================================================================
# HW robot geometry - demo values, read by xacro only
# =============================================================================
robot_geometry:

  base_link:
    mass: 5.0
    size: [0.5, 0.5, 0.1] # x, y, z
    offset_z: 0.0973
    nav_offset_x: 0.032
    nav_offset_z: 0.0

  imu:
    offset_x: 0.056
    offset_y: 0.020
    offset_z: 0.015

  lidar:
    offset_x: 0.005
    offset_z: 0.2

  bumpers:
    - name: 'front'
      pin: 0
      inverted: false
      size: [0.02, 0.30, 0.05] # x(depth), y(width), z(height)
      offset: [0.30, 0.0, 0.0] # x, y, z
      yaw: 0.0
      parent_frame: 'base_link'

    - name: 'rear'
      pin: 1
      inverted: false
      size: [0.02, 0.30, 0.05]
      offset: [-0.30, 0.0, 0.0]
      yaw: 3.14159
      parent_frame: 'base_link'

    - name: 'left'
      pin: 2
      inverted: false
      size: [0.02, 0.20, 0.05]
      offset: [0.0, 0.30, 0.0]
      yaw: 1.5708
      parent_frame: 'base_link'

    - name: 'right'
      pin: 3
      inverted: false
      size: [0.02, 0.20, 0.05]
      offset: [0.0, -0.30, 0.0]
      yaw: -1.5708
      parent_frame: 'base_link'

  cliff_sensors:
    - name: 'fl'
      pin: 0
      size: [0.02, 0.02, 0.02]
      offset: [0.25, 0.20, 0.0]
      yaw: 0.0
      parent_frame: 'base_link'

    - name: 'fr'
      pin: 1
      size: [0.02, 0.02, 0.02]
      offset: [0.25, -0.20, 0.0]
      yaw: 0.0
      parent_frame: 'base_link'

    - name: 'rl'
      pin: 2
      size: [0.02, 0.02, 0.02]
      offset: [-0.25, 0.20, 0.0]
      yaw: 3.14159
      parent_frame: 'base_link'

    - name: 'rr'
      pin: 3
      size: [0.02, 0.02, 0.02]
      offset: [-0.25, -0.20, 0.0]
      yaw: 3.14159
      parent_frame: 'base_link'

# =============================================================================
# HW node parameters - passed as --params-file to ROS nodes
# =============================================================================

lidar_node:
  ros__parameters:
    frame_id: 'lidar_mount'
    angle_min: 0.0
    angle_max: 6.28319
    range_max: 5.0
    range_min: 0.05
    port: '/dev/serial/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.2:1.0-port0'
    motor_pin: 19
    frequency: 10000
    target_rpm: 300

motors_node:
  ros__parameters:
    port: '/dev/serial/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.4:1.0-port0'
    max_speed: 255

display_node:
  ros__parameters:
    width: 128
    height: 32
    orientation: 2
    brightness: 5

fan_control_node:
  ros__parameters:
    fan_pin: 13
    frequency: 10
    min_to_run: 0.25
    user_power: [0.0, 0.5, 1.0]

sharp_sensors_node:
  ros__parameters:
    v_points: [0.3, 0.4, 0.8, 1.2, 2.0, 2.5]
    d_points: [0.20, 0.15, 0.08, 0.05, 0.03, 0.02]
