<div class="page-shell users-layout">
    <div class="page-head">
        <div>
            <h1 class="page-title">Uživatelé a role</h1>
            <p class="page-subtitle">Správa připojených klientů a oprávnění operátora/admina.</p>
        </div>
    </div>

    <div class="permissions-section panel panel-pad">
        <h2>Oprávnění</h2>
        <div class="role-display">
            Vaše aktuální role: <span id="role-status" class="role-label role-spectator">Spectator</span>
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="requestControl('operator')">Žádat o řízení (Operator)</button>
            <button class="btn btn-warning" onclick="requestControl('admin')">Převzít jako Admin</button>
            <button class="btn btn-danger" onclick="kickOperator()">Odebrat operátora (Admin)</button>
        </div>
    </div>

    <div id="user-list-container" class="list-container panel panel-pad surface-list">
        <!-- Seznam uživatelů bude zde -->
    </div>
</div>
