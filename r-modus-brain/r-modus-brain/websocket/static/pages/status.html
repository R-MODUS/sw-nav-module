<div class="centered-content">
    <h1>Systémový Status</h1>
    <div class="status-monitor">
        <div class="stat-circle">
            <span class="label">CPU</span>
            <strong id="cpu-val">0</strong><span class="unit">%</span>
        </div>
        <div class="stat-circle">
            <span class="label">RAM</span>
            <strong id="ram-val">0</strong><span class="unit">%</span>
        </div>
        <div class="stat-circle">
            <span class="label">TEMP</span>
            <strong id="temp-val">0</strong><span class="unit">°C</span>
        </div>
    </div>
</div>
