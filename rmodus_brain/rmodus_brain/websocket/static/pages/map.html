<div class="map-page">
    <div class="map-header">
        <h1>🗺️ Lokace robota</h1>
        <div class="map-info">
            <span id="goalStatus">Klikněte na mapu pro zadání cíle</span>
        </div>
    </div>

    <div class="map-container">
        <div class="map-controls-left">
            <div class="control-panel">
                <h3>Legenda</h3>
                <div class="legend-item">
                    <div class="legend-color robot"></div>
                    <span>Robot</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color goal"></div>
                    <span>Cíl</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color path"></div>
                    <span>Trasa</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color occupied"></div>
                    <span>Překážka</span>
                </div>
            </div>
        </div>

        <div class="map-canvas-wrapper">
            <canvas id="mapCanvas" width="800" height="600"></canvas>
            <div class="map-instructions">
                <p id="mapInstruction">1. Klik = vstupní bod</p>
            </div>
        </div>

        <div class="map-controls-right">
            <div class="control-panel">
                <h3>Ovládání</h3>
                <div class="input-group">
                    <label>Zoom</label>
                    <input type="range" id="mapZoom" min="0.5" max="3" step="0.1" value="1">
                </div>
                <div class="button-group">
                    <button id="btnCancelGoal" style="display: none;">❌ Zrušit</button>
                    <button id="btnSendGoal" style="display: none;">✓ Poslat cíl</button>
                </div>
                <div id="goalCoordinates" style="display: none;" class="coordinates">
                    <p><strong>Cíl:</strong></p>
                    <p>X: <span id="goalX">-</span> m</p>
                    <p>Y: <span id="goalY">-</span> m</p>
                    <p>Yaw: <span id="goalYaw">-</span>°</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../js/map.js"></script>
