<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R-MODUS</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="app-container" id="app-root">
        <aside class="sidebar-shell" aria-label="Hlavní navigace">
            <button type="button" class="sidebar-rail-expand" id="sidebar-expand-btn" aria-label="Zobrazit nabídku" title="Zobrazit nabídku"></button>
            <nav class="sidebar">
            <div class="sidebar-header">
                <span class="logo">R-MODUS</span>
                <button type="button" class="sidebar-header-collapse" id="sidebar-collapse-btn" aria-label="Skrýt nabídku" title="Skrýt nabídku">‹</button>
            </div>
            <ul class="nav-links">
                <li onclick="window.loadPage('status')" id="nav-status">📊 Status</li>
                <li onclick="window.loadPage('controls')" id="nav-controls">🕹️ Ovládání</li>
                <li onclick="window.loadPage('map')" id="nav-map">🗺️ Mapa</li>
                <li onclick="window.loadPage('sensors')" id="nav-sensors">🧭 Senzory</li>


                <li onclick="window.loadPage('docs')" id="nav-docs">📄 Manuál</li>
                <li onclick="window.loadPage('config')" id="nav-config">⚙️ Konfigurace</li>
            </ul>
            <div class="sidebar-footer">
                <ul class="nav-links-bottom">
                    <li onclick="window.loadPage('users')" id="nav-users">👥 Uživatelé</li>
                </ul>
                <p id="conn">❌ Odpojeno</p>
            </div>
            </nav>
        </aside>

        <main id="main-content" class="main-view">
            <!-- Obsah se načítá dynamicky zde -->
        </main>
    </div>

    <!-- Hlavní logika aplikace -->
    <script src="static/js/app.js"></script>
    
    <!-- Skripty specifické pro stránky -->
    <script src="static/js/map.js"></script>
    <script src="static/js/robot_view.js"></script>
    <script src="static/js/sensors.js"></script>

</body>
</html>
