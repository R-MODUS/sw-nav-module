ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    two_d_mode: true
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    publish_tf: true
    publish_tf: true

    odom0: /odom
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_queue_size: 10

    odom1: /odom_lidar
    odom1_config: [true,  true,  false,   # X, Y (Lidar dává dobrou absolutní pozici)
                  false, false, true,     # Yaw (Lidar dává dobrou orientaci)
                  false, false, false,    # Rychlost u Lidaru často skáče, 
                  false, false, false,    # proto ji raději nebrat, pokud máš Flow
                  false, false, false]
    odom1_differential: false

    imu0: /imu/data
    imu0_config: [false, false, false, # X, Y, Z pozice
                  true,  true,  true,  # Roll, Pitch, Yaw
                  false, false, false, # Lineární rychlost
                  true,  true,  true,  # Úhlová rychlost
                  false, false, false] # Lineární zrychlení
    imu0_differential: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
    
    twist0: /visual_flow/data
    twist0_config: [false, false, false, # x, y, z pozice
                    false, false, false, # roll, pitch, yaw orientace
                    true,  true,  false, # vx, vy, vz
                    false, false, false, # vroll, vpitch, vyaw
                    false, false, false] # ax, ay, az zrychlení
    twist0_relative: false